services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    environment:
      - SERVER_PORT=8080
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-evolution}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_GLOBAL_KEY:-your_global_api_key_here}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_EXPOSE_IN_ENV=true
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1038839325
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    restart: always

  bot:
    build: .
    container_name: chatbot
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
    restart: always

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

